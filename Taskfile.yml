version: '3'

tasks:
  default:
    desc: List all available tasks
    cmds:
      - task --list
    silent: true

  test:
    desc: Run all tests
    cmds:
      - pytest tests/

  fmt:
    desc: Format all Python code
    cmds:
      - ruff format .

  lint:
    desc: Lint all Python code
    cmds:
      - ruff check .

  validate:
    desc: Validate all example documents
    cmds:
      - python validation/vbrief_validator.py examples/*.vbrief.json

  git:hooks:install:
    desc: Install local git hooks (pre-commit + commit-msg)
    cmds:
      - |
        set -euo pipefail
        mkdir -p .git/hooks
        cp -f tools/githooks/pre-commit .git/hooks/pre-commit
        cp -f tools/githooks/commit-msg .git/hooks/commit-msg
        chmod +x .git/hooks/pre-commit .git/hooks/commit-msg
        echo "Installed git hooks into .git/hooks"
